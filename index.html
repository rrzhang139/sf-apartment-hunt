<style>
  :root{--bg:#0f1419;--panel:#1a212b;--panel2:#222c38;--line:#2c3947;--txt:#e6edf3;--mut:#8b9aa9;--acc:#4ea1ff;--good:#3fb950;--warn:#d29922;--bad:#f85149}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  header{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:var(--panel)}
  header h1{font-size:18px;margin:0}
  header .sub{color:var(--mut);font-size:13px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
  .chip{padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);cursor:pointer;font-size:13px}
  .chip.active{background:var(--acc);border-color:var(--acc);color:#001;font-weight:600}
  .wrap{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 56px)}
  .list{overflow-y:auto;border-right:1px solid var(--line);background:var(--panel)}
  .card{padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer}
  .card:hover{background:var(--panel2)}
  .card.sel{background:var(--panel2);border-left:3px solid var(--acc)}
  .card .nm{font-weight:600;font-size:14px}
  .card .ad{color:var(--mut);font-size:12px;margin:2px 0}
  .card .rb{font-size:13px;margin-top:4px}
  .badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:10px;margin-right:5px}
  .b-yes{background:rgba(63,185,80,.15);color:var(--good)}
  .b-warn{background:rgba(210,153,34,.15);color:var(--warn)}
  .b-no{background:rgba(248,81,73,.15);color:var(--bad)}
  .right{display:grid;grid-template-rows:300px 1fr;overflow:hidden}
  #map{width:100%;height:100%}
  .detail{overflow-y:auto;padding:20px 24px}
  .detail h2{margin:0 0 2px}
  .detail .addr{color:var(--mut);margin-bottom:10px}
  .sec{margin:18px 0;border-top:1px solid var(--line);padding-top:14px}
  .sec h3{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--acc);margin:0 0 10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--mut);font-weight:500;font-size:12px}
  a{color:var(--acc);text-decoration:none}a:hover{text-decoration:underline}
  .btn{display:inline-block;padding:5px 11px;border-radius:6px;background:var(--acc);color:#001 !important;font-size:12px;font-weight:600;margin:2px 4px 2px 0}
  .btn.ghost{background:transparent;border:1px solid var(--acc);color:var(--acc) !important}
  .pill{font-size:12px;padding:2px 8px;border-radius:10px;background:var(--panel2);margin-right:5px;display:inline-block;margin-bottom:4px}
  .sev-high{color:var(--bad)}.sev-med{color:var(--warn)}.sev-low{color:var(--good)}
  .empty{color:var(--mut);font-size:13px;font-style:italic}
  .kv{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .kv .k{color:var(--mut);min-width:90px}
  .note{font-size:12px;color:var(--mut);background:var(--panel2);padding:8px 10px;border-radius:6px;margin-top:8px}
  .cmt-row{cursor:pointer}.cmt-row:hover{background:var(--panel2)}
  .cmt-row.active{background:rgba(78,161,255,.14);box-shadow:inset 3px 0 0 var(--acc)}
  .leaflet-tooltip.st-tt{background:#001d3d;color:#cfe6ff;border:1px solid var(--acc);font-weight:600}
  .train-ic{font-size:19px;line-height:24px;text-align:center;filter:drop-shadow(0 1px 2px #000)}
</style>
</head>

// Caltrain station coordinates for route drawing
const STATIONS={
 "22nd St Caltrain":[37.7573,-122.3922],
 "22nd St Caltrain (transfer)":[37.7573,-122.3922],
 "4th & King Caltrain":[37.7766,-122.3947]
};
// Permanent Caltrain station markers (SF + next stop south)
const CALTRAIN=[
 {name:"🚉 4th & King (San Francisco)",lat:37.7766,lng:-122.3947},
 {name:"🚉 22nd Street",lat:37.7573,lng:-122.3922},
 {name:"🚉 Bayshore",lat:37.7095,lng:-122.4012}
];
const trainIcon=L.divIcon({className:'train-ic',html:'🚉',iconSize:[24,24],iconAnchor:[12,12]});
CALTRAIN.forEach(s=>{
 L.marker([s.lat,s.lng],{icon:trainIcon,zIndexOffset:1000}).addTo(map)
  .bindTooltip(s.name.replace('🚉 ',''),{permanent:true,direction:'right',className:'st-tt',offset:[10,0]});
});
function modeColor(mode){if(mode.includes('🚶'))return '#3fb950';if(mode.includes('🚲'))return '#d29922';if(mode.includes('🚊'))return '#bc8cff';return '#4ea1ff';}
function clearRoutes(){routeLayers.forEach(l=>map.removeLayer(l));routeLayers=[];if(stationMarker){map.removeLayer(stationMarker);stationMarker=null;}}
async function drawRoute(from,to,color,dash){
  let coords=null;
  try{
    const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${from[1]},${from[0]};${to[1]},${to[0]}?overview=full&geometries=geojson`);
    const j=await r.json();
    if(j.routes&&j.routes[0])coords=j.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
  }catch(e){}
  if(!coords)coords=[from,to];
  // casing under the colored line for contrast on the dark map
  routeLayers.push(L.polyline(coords,{color:'#0b0f14',weight:8,opacity:.7}).addTo(map));
  routeLayers.push(L.polyline(coords,{color,weight:5,opacity:.95,dashArray:dash?'9,7':null}).addTo(map));
  return coords;
}
async function drawCommute(d,optIndex){
  if(!d.commute)return;
  const st=STATIONS[d.commute.station];if(!st)return;
  lastOpt=optIndex;
  clearRoutes();
  const o=d.commute.options[optIndex]||d.commute.options[0];
  const dashed=o.mode.includes('🚌')||o.mode.includes('🚊');
  const coords=await drawRoute([d.lat,d.lng],st,modeColor(o.mode),dashed);
  const b=L.latLngBounds(coords.concat([[d.lat,d.lng],st]));
  map.fitBounds(b.pad(0.3));
  document.querySelectorAll('.cmt-row').forEach((r,i)=>r.classList.toggle('active',i===optIndex));
}
function highlightRoute(i){if(curD)drawCommute(curD,i);}

function availBadge(a){return a==='yes'?'<span class="badge b-yes">2BR available</span>':a==='warn'?'<span class="badge b-warn">furnished/call</span>':'<span class="badge b-no">no 2BR now</span>';}

function renderList(){
  const list=document.getElementById('list');list.innerHTML='';
  DATA.filter(d=>filter==='All'||d.hood===filter).forEach(d=>{
    const c=document.createElement('div');c.className='card'+(d.id===selId?' sel':'');
    c.innerHTML=`<div class="nm">${d.name}</div><div class="ad">${d.hood} · ${d.address}</div><div class="rb">${availBadge(d.avail)} ${d.rentBand}</div>`;
    c.onclick=()=>select(d.id);list.appendChild(c);
  });
}

function sev(s){return `<span class="sev-${s}">${s.toUpperCase()}</span>`;}

function select(id){
  selId=id;renderList();
  const d=DATA.find(x=>x.id===id);curD=d;
  if(markers[id]){map.setView([d.lat,d.lng],15);markers[id].openTooltip();}
  const unitRows=d.units.map(u=>`<tr><td><b>${u.u}</b></td><td>${u.bb}</td><td>${u.sf} sf</td><td>${u.rent}</td><td>${u.av}</td><td><a class="btn" href="${u.link}" target="_blank">Open ↗</a></td></tr>`).join('');
  const extRows=d.externalities.map(e=>`<tr><td>${e.f}</td><td>${sev(e.s)}</td><td>${e.n}</td></tr>`).join('');
  const faceSec=d.facing?`<div class="sec"><h3>🧭 Which way to face</h3><div class="note"><b>Ask for:</b> ${d.facing.best}</div><table><tr><th>Side</th><th>Noise</th><th>What's immediately outside</th></tr>${d.facing.sides.map(f=>`<tr><td><b>${f.dir}</b></td><td>${sev(f.s)}</td><td>${f.what}</td></tr>`).join('')}</table></div>`:'';
  const cmt=d.commute;
  const commuteSec=cmt?`<div class="sec"><h3>🚆 Route to Caltrain — ${cmt.station}</h3>
    <div class="note"><b>Best daily:</b> ${cmt.best} &nbsp;·&nbsp; 🗺️ <span style="color:var(--acc)">click a row to draw it on the map</span></div>
    <table><tr><th>Mode</th><th>Time</th><th>Fare</th><th>Frequency</th><th>Route / notes</th></tr>${cmt.options.map((o,i)=>`<tr class="cmt-row" onclick="highlightRoute(${i})"><td><b>${o.mode}</b></td><td>${o.time}</td><td>${o.cost}</td><td>${o.freq}</td><td>${o.route}${o.notes?` — <span style="color:var(--mut)">${o.notes}</span>`:''}</td></tr>`).join('')}</table>
    <div class="kv" style="margin-top:8px"><span class="k">Caltrain leg</span><span>${cmt.caltrainLeg}</span></div>
    <div class="kv"><span class="k">Total door→office</span><span>${cmt.doorToOffice}</span></div>
    <div class="note" style="margin-top:4px">ℹ️ <b>Total = walk to the station (the Walk row above) + the Caltrain leg + ~8-min walk in Redwood City + waiting.</b> The ~37-min train ride dominates, so being next to the station mainly shortens the first leg — it doesn't shrink the whole commute.</div>
    ${cmt.rushTip?`<div class="note">⏰ <b>Weekday rush:</b> ${cmt.rushTip}</div>`:''}
  </div>`:'';
  const revs=d.reviews.length?d.reviews.map(r=>`<tr><td>${r.src}</td><td>${r.rating||'—'}</td><td>${r.quote}</td><td><a href="${r.url}" target="_blank">link ↗</a></td></tr>`).join(''):`<tr><td colspan="4" class="empty">Resident reviews being scraped by the research fleet (Reddit / Yelp / ApartmentRatings / forums) — landing in the full app.</td></tr>`;
  const amenPills=(arr)=>arr.map(a=>`<span class="pill">${a}</span>`).join('');
  document.getElementById('detail').innerHTML=`
    <h2>${d.name} ${availBadge(d.avail)}</h2>
    <div class="addr">${d.hood} · ${d.address} · built ${d.year}</div>
    <div><a class="btn" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.address+' San Francisco')}" target="_blank">📍 Map</a>
    <a class="btn ghost" href="${d.contact.site}" target="_blank">🏢 Building site</a>
    <a class="btn ghost" href="${d.contact.apply}" target="_blank">📝 Apply</a></div>
    <div class="note"><b>Verdict:</b> ${d.verdict}</div>
    <div class="sec"><h3>Snapshot</h3>
      <div class="kv"><span class="k">Rent</span><span>${d.rentBand} · ${d.each}</span></div>
      <div class="kv"><span class="k">Caltrain</span><span>${d.caltrain}</span></div>
      <div class="kv"><span class="k">Parking</span><span>${d.parking}</span></div>
      <div class="kv"><span class="k">Modern</span><span>${d.modern}</span></div>
      <div class="kv"><span class="k">Contact</span><span>${d.contact.phone}${d.contact.email!=='—'?' · '+d.contact.email:''}</span></div>
    </div>
    ${commuteSec}
    <div class="sec"><h3>Available units &amp; tours</h3><table><tr><th>Unit</th><th>Bd/Ba</th><th>Size</th><th>Rent</th><th>Available</th><th></th></tr>${unitRows}</table></div>
    <div class="sec"><h3>⚠️ Externalities</h3><table><tr><th>Factor</th><th>Severity</th><th>Day-to-day</th></tr>${extRows}</table></div>
    ${faceSec}
    <div class="sec"><h3>🔇 Construction / soundproofing</h3><p style="font-size:13px">${d.sound}</p></div>
    <div class="sec"><h3>🏘️ Neighborhood</h3>
      <div class="kv"><span class="k">Coffee</span><span>${amenPills(d.amenities.coffee)}</span></div>
      <div class="kv"><span class="k">Grocery</span><span>${amenPills(d.amenities.grocery)}</span></div>
      <div class="kv"><span class="k">Transit</span><span>${amenPills(d.amenities.transit)}</span></div>
      <div class="kv"><span class="k">Gym</span><span>${d.amenities.gym}</span></div>
    </div>
    <div class="sec"><h3>💬 Resident reviews</h3><table><tr><th>Source</th><th>Rating</th><th>Quote</th><th></th></tr>${revs}</table></div>
    <div class="sec"><h3>🚩 Main complaints</h3>${d.complaints.map(c=>`<span class="pill">${c}</span>`).join('')}</div>
  `;
  if(d.commute)drawCommute(d,0);
}
renderList();
</script>
</body>
</html>
